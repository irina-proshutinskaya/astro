<script>
const D=JSON.parse(document.getElementById('data').textContent);
const MN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d,12,0,0);}
const now=new Date(); const t0=new Date(now.getFullYear(),now.getMonth(),now.getDate(),12,0,0);
document.getElementById('today').textContent=t0.getDate()+' '+MN[t0.getMonth()]+' '+t0.getFullYear()+' г.';
function days(a,b){return Math.round((pd(b)-a)/86400000);}
function cls(e){return e.tense?'tense':(/трин|секстиль|🟢/.test(e.title)||e.harm?'harm':'soft');}
let H='';
// current chapter
const ch=D.chapters.find(c=>t0>=pd(c.start)&&t0<=pd(c.end));
if(ch){H+=`<div class="card"><p class="label">Глава жизни сейчас</p><div class="big">${ch.title}</div><p class="desc">${ch.desc}</p></div>`;}
// current periods
const per=D.periods.filter(p=>t0>=pd(p.start)&&t0<=pd(p.end));
if(per.length){H+='<div class="card"><p class="label">Период сейчас</p>';
 per.forEach(p=>{H+=`<div class="row"><div class="etitle">${p.title}${p.tense?'<span class="pill tense">беречь себя</span>':'<span class="pill harm">действовать</span>'}</div><p class="ecomp">${p.desc}</p></div>`;});H+='</div>';}
// today events
const todayStr=t0.getFullYear()+'-'+String(t0.getMonth()+1).padStart(2,'0')+'-'+String(t0.getDate()).padStart(2,'0');
const te=D.events.filter(e=>e.date===todayStr).sort((a,b)=>({высокая:0,средняя:1,фоновая:2}[a.imp]-{высокая:0,средняя:1,фоновая:2}[b.imp]));
H+='<div class="card"><p class="label">Сегодня по транзитам</p>';
if(te.length){te.forEach(e=>{H+=`<div class="row"><div class="etitle">${e.title}<span class="pill ${cls(e)}">${e.tense?'напряжение':'поддержка'}</span></div><p class="emeta">${e.meaning}</p><p class="ecomp"><b>Как прожить:</b> ${e.comp}</p></div>`;});}
else{H+='<p class="calm">Сегодня без точных аспектов — спокойный день. Держи фокус текущего периода выше.</p>';}
H+='</div>';
// next important (high events + milestones + solar)
let imp=[];
D.events.filter(e=>e.date>todayStr&&e.imp==='высокая').forEach(e=>imp.push({date:e.date,title:e.title,txt:e.comp,meaning:e.meaning,tense:e.tense,kind:'транзит'}));
D.milestones.filter(m=>m.date>todayStr).forEach(m=>imp.push({date:m.date,title:m.title,txt:m.desc,meaning:'',tense:m.tense,kind:'веха'}));
D.solar.filter(s=>s.date>todayStr).forEach(s=>imp.push({date:s.date,title:s.title,txt:s.desc,meaning:'',tense:false,kind:'соляр'}));
imp.sort((a,b)=>pd(a.date)-pd(b.date));
if(imp.length){const n=imp[0];const dd=days(t0,n.date);
 H+=`<div class="card"><p class="label">Ближайшее важное</p><div class="etitle">${n.title}</div><p class="count">через <b>${dd}</b> ${dd%10===1&&dd%100!==11?'день':(dd%10>=2&&dd%10<=4&&(dd%100<10||dd%100>=20)?'дня':'дней')} · ${pd(n.date).getDate()+' '+MN[pd(n.date).getMonth()]+' '+pd(n.date).getFullYear()}</p>${n.meaning?`<p class="emeta">${n.meaning}</p>`:''}<p class="ecomp"><b>Как прожить:</b> ${n.txt}</p></div>`;
 // next few
 H+='<div class="card"><p class="label">Дальше на горизонте</p>';
 imp.slice(1,6).forEach(e=>{const dd=days(t0,e.date);H+=`<div class="row"><span class="dot" style="background:${e.tense?'var(--red)':'var(--grn)'}"></span><b>${pd(e.date).getDate()+' '+MN[pd(e.date).getMonth()]}</b> · ${e.title} <span class="count">(через ${dd} дн.)</span></div>`;});
 H+='</div>';}
// prep: tense period/milestone within 30 days
let prep=[];
D.periods.filter(p=>p.tense).forEach(p=>{const dd=days(t0,p.start);if(dd>0&&dd<=30)prep.push({dd,title:p.title,txt:p.desc});});
D.milestones.filter(m=>m.tense).forEach(m=>{const dd=days(t0,m.date);if(dd>0&&dd<=45)prep.push({dd,title:m.title,txt:m.desc});});
prep.sort((a,b)=>a.dd-b.dd);
if(prep.length){H+='<div class="card prep"><p class="label" style="color:var(--gold)">Готовься заранее</p>';
 prep.forEach(p=>{H+=`<div class="row"><div class="etitle">Через ${p.dd} дн.: ${p.title}</div><p class="ecomp"><b>Смягчить заранее:</b> выспись, разгрузи график, спланируй отдых, тело и подушку в приоритет. ${p.txt}</p></div>`;});H+='</div>';}
document.getElementById('app').innerHTML=H;
</script>
</body></html>
